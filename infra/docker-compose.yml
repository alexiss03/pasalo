services:
  postgres:
    image: postgres:16
    container_name: pasalo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pasalo
    ports:
      - "5432:5432"
    volumes:
      - pasalo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pasalo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pasalo_pgdata:
